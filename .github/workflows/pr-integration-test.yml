name: Integration Tests

permissions:
    contents: read

on:
    pull_request:
        branches:
            - main

jobs:
    Integration-Tests:
        name: Integration Tests
        runs-on: ubuntu-latest
        env:
            NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v2

            - name: Setup Node.js
              uses: actions/setup-node@v2
              with:
                  node-version: "22"

            - name: Install dependencies
              run: yarn install --frozen-lockfile --check-files --verbose

            - name: Log dependencies
              run: yarn list > deps.txt

            - name: Upload dependencies log file for integration tests
              uses: actions/upload-artifact@v4
              with:
                  name: dependencies-log
                  path: deps.txt

            - name: Run Jest tests
              run: yarn test:integration
